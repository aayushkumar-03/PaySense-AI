<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaySense AI — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0A0F1E;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      width: 80px; height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 800;
      margin: 0 auto 24px;
      box-shadow: 0 0 40px rgba(14,165,233,0.3);
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #6B7280; font-size: 0.9rem; max-width: 320px; line-height: 1.6; }
    button {
      margin-top: 24px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: #fff;
      border: none; border-radius: 12px;
      padding: 10px 24px;
      font-size: 0.875rem; font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="logo">P</div>
  <h1>You're Offline</h1>
  <p>PaySense AI needs an internet connection to fetch your financial data and run AI insights.</p>
  <p style="margin-top:12px; color:#374151; font-size:0.8rem;">Your previously loaded data may still be accessible once you reconnect.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
